<!DOCTYPE html>
<!--
  migrate-backgrounds.html
  IndexedDB（settings ストア）に保存された背景画像を Firestore backgrounds/{key} に移行する一時ツール。
  移行完了後はこのファイルを削除すること。
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>背景画像 移行ツール（IndexedDB → Firestore）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #111; color: #eee; padding: 16px; min-height: 100vh; }
  h1  { font-size: 17px; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }

  .card { background: #1e1e1e; border: 1px solid #333; border-radius: 10px;
          padding: 14px; margin-bottom: 12px; }
  .card h2 { font-size: 13px; color: #aaa; margin-bottom: 8px; }

  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; font-size: 13px; }
  .badge { font-size: 11px; font-weight: bold; padding: 2px 7px; border-radius: 20px; }
  .badge-ok    { background: #14532d; color: #4ade80; }
  .badge-skip  { background: #312e1a; color: #fbbf24; }
  .badge-err   { background: #450a0a; color: #f87171; }
  .badge-info  { background: #1e3a5f; color: #60a5fa; }
  .badge-warn  { background: #312e1a; color: #fbbf24; }

  .diag { font-size: 12px; font-family: monospace; line-height: 2;
          background: #0d0d0d; border-radius: 6px; padding: 10px; }
  .diag .label { color: #888; }
  .diag .val   { color: #eee; font-weight: bold; }
  .diag .ok    { color: #4ade80; }
  .diag .warn  { color: #fbbf24; }
  .diag .err   { color: #f87171; }

  .log { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 8px;
         padding: 10px; font-size: 12px; font-family: monospace; max-height: 360px;
         overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  .log .ok   { color: #4ade80; }
  .log .skip { color: #fbbf24; }
  .log .err  { color: #f87171; }
  .log .info { color: #60a5fa; }

  button { padding: 11px 20px; border-radius: 8px; border: none; cursor: pointer;
           font-size: 14px; font-weight: bold; transition: opacity .15s; }
  button:disabled { opacity: .4; cursor: default; }
  .btn-blue  { background: #2563eb; color: #fff; }
  .btn-green { background: #16a34a; color: #fff; }
  .btn-gray  { background: #374151; color: #ccc; }
  .btn-orange { background: #c2410c; color: #fff; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

  .notice { border-radius: 8px; padding: 12px 14px; font-size: 13px; line-height: 1.7; }
  .notice-green  { background: #1a2e1a; border: 1px solid #2d5a2d; color: #86efac; }
  .notice-yellow { background: #2a2307; border: 1px solid #4a3f10; color: #fde68a; }
  .notice-red    { background: #2d1a1a; border: 1px solid #5a2d2d; color: #fca5a5; }

  /* 上書き確認ダイアログ */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
             z-index: 100; align-items: center; justify-content: center; }
  #overlay.show { display: flex; }
  #dialog { background: #1e1e1e; border: 1px solid #444; border-radius: 12px;
            padding: 20px; max-width: 420px; width: 90%; }
  #dialog h3 { font-size: 15px; margin-bottom: 10px; }
  #dialog p  { font-size: 13px; color: #aaa; line-height: 1.6; margin-bottom: 14px; }
  #dialog ul { font-size: 12px; font-family: monospace; color: #fbbf24;
               background: #111; border-radius: 6px; padding: 8px 12px;
               max-height: 160px; overflow-y: auto; margin-bottom: 14px; list-style: none; }
  #dialog li::before { content: "⚠ "; }
</style>
</head>
<body>

<h1>🖼 背景画像 移行ツール</h1>
<p class="subtitle">IndexedDB（settings ストア）→ Firestore（backgrounds コレクション）</p>

<!-- 接続状態 -->
<div class="card" id="cardStatus">
  <h2>接続状態</h2>
  <div class="row" id="rowFirebase"><span class="badge badge-info">待機</span> Firebase 認証</div>
  <div class="row" id="rowIDB"><span class="badge badge-info">待機</span> IndexedDB 診断</div>
</div>

<!-- 診断パネル：常に表示、トラブル時はここを確認する -->
<div class="card" id="cardDiag" style="display:none">
  <h2>診断情報</h2>
  <div class="diag" id="diagInfo"></div>
</div>

<!-- Firestore 現在状態 -->
<div class="card" id="cardFirestoreStatus" style="display:none">
  <h2>Firestore 現在の状態</h2>
  <div id="firestoreStatusBody" style="font-size:13px; line-height:1.8;"></div>
</div>

<!-- スキャン結果 -->
<div class="card" id="cardScan" style="display:none">
  <h2>IndexedDB スキャン結果</h2>
  <div id="scanResult" style="font-size:13px; line-height:1.8;"></div>
  <div class="btn-row" id="scanBtnRow">
    <button id="btnStart" class="btn-green" disabled>▶ 移行を開始する</button>
    <button id="btnCancel" class="btn-gray" onclick="location.reload()">キャンセル</button>
  </div>
</div>

<!-- 移行ログ -->
<div class="card" id="cardLog" style="display:none">
  <h2>移行ログ</h2>
  <div class="log" id="log"></div>
  <div id="summaryEl"></div>
</div>

<!-- 上書き確認ダイアログ -->
<div id="overlay">
  <div id="dialog">
    <h3>⚠ 既存データが見つかりました</h3>
    <p>以下のキーは Firestore にすでに存在します。<br>どちらの処理を行いますか？</p>
    <ul id="conflictList"></ul>
    <div class="btn-row">
      <button id="btnOverwrite" class="btn-blue">上書きして移行</button>
      <button id="btnSkipExisting" class="btn-gray">既存はスキップ（新規のみ移行）</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
// ─── Firebase ────────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyBQrUYDr8kv8kWaOzVUVQuPeQtIZlRD72c",
  authDomain:        "izna-archive.firebaseapp.com",
  projectId:         "izna-archive",
  storageBucket:     "izna-archive.firebasestorage.app",
  messagingSenderId: "1083631359944",
  appId:             "1:1083631359944:web:2c79813979b561b84212fd"
};
firebase.initializeApp(FIREBASE_CONFIG);
const fbAuth = firebase.auth();
const fbDb   = firebase.firestore();

// ─── IndexedDB 定数（index.html と完全に同じ値） ────────────
// DB名:  iznaArchiveDB_v3
// バージョン: 3
// ストア: "cards" (keyPath:"id"), "images" (keyPath:"id"), "settings" (keyPath:"key")
const DB_NAME          = "iznaArchiveDB_v3";
const DB_VERSION       = 3;
const SETTINGS_STORE   = "settings";

// transform の localStorage キー・デフォルト値（index.html と同じ）
const BG_TRANSFORM_KEY = "izna_bg_transform_v1";
const BG_TRANSFORM_DEF = { scale: 100, offsetX: 50, offsetY: 50, fillColor: "#000000" };

function isBgKey(key) {
  return key === "appBackground" || key.startsWith("bg_");
}

// ─── UI ヘルパー ─────────────────────────────────────────────
function setBadge(rowId, cls, text) {
  const row = document.getElementById(rowId);
  row.querySelector(".badge").className = `badge badge-${cls}`;
  row.querySelector(".badge").textContent = text;
}
const logEl = document.getElementById("log");
function log(cls, msg) {
  const span = document.createElement("span");
  span.className = cls;
  span.textContent = msg + "\n";
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

// ─── 診断パネル表示 ──────────────────────────────────────────
function showDiagnostics(db, repaired) {
  const stores     = Array.from(db.objectStoreNames);
  const hasSettings = stores.includes(SETTINGS_STORE);
  const repairedNote = repaired ? ' <span class="ok">（自動修復済）</span>' : "";

  document.getElementById("diagInfo").innerHTML = [
    `<span class="label">DB 名:      </span><span class="val">${db.name}</span>`,
    `<span class="label">バージョン:  </span><span class="val">${db.version}</span>`,
    `<span class="label">ストア一覧:  </span><span class="val">${stores.join(", ") || "(なし)"}</span>`,
    `<span class="label">"settings": </span><span class="${hasSettings ? "ok" : "err"}">${hasSettings ? "あり ✅" : "なし ❌"}${repairedNote}</span>`,
  ].join("<br>");
  document.getElementById("cardDiag").style.display = "";

  console.log("[migrate] DB診断:", {
    name: db.name, version: db.version,
    stores, hasSettings, repaired: !!repaired,
    origin: location.origin
  });
}

// ─── IndexedDB open（壊れた DB の自動修復つき） ───────────────
// 「バージョン 3 だがストアが 0 件」という状態は、
// 以前に空の onupgradeneeded で DB が作られたときに発生する。
// 検出したら deleteDatabase して再オープンすることで修復する。
function openDbRaw() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      // index.html と同じストア作成ロジック
      const d = e.target.result;
      if (!d.objectStoreNames.contains("cards"))
        d.createObjectStore("cards",   { keyPath: "id" });
      if (!d.objectStoreNames.contains("images"))
        d.createObjectStore("images",  { keyPath: "id" });
      if (!d.objectStoreNames.contains(SETTINGS_STORE))
        d.createObjectStore(SETTINGS_STORE, { keyPath: "key" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function openDb() {
  const db = await openDbRaw();

  // 「バージョンは合っているがストアが空」= 壊れた状態を検出して修復
  if (db.objectStoreNames.length === 0) {
    console.warn("[migrate] 壊れた DB を検出（v3 だがストアなし）。削除して再作成します。");
    db.close();
    await new Promise((res, rej) => {
      const del = indexedDB.deleteDatabase(DB_NAME);
      del.onsuccess  = res;
      del.onerror    = () => rej(new Error("DB の削除に失敗しました"));
      del.onblocked  = () => rej(new Error("DB の削除がブロックされました（別タブを閉じてください）"));
    });
    const fresh = await openDbRaw();
    return { db: fresh, repaired: true };
  }
  return { db, repaired: false };
}

// settings ストアの全レコードを取得。ストアが存在しない場合は空配列。
function getAllSettings(db) {
  return new Promise((resolve, reject) => {
    if (!db.objectStoreNames.contains(SETTINGS_STORE)) {
      console.warn("[migrate] settings ストアが存在しません");
      resolve([]);
      return;
    }
    const tx  = db.transaction(SETTINGS_STORE, "readonly");
    const req = tx.objectStore(SETTINGS_STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror   = () => reject(req.error);
  });
}

// ─── 変換・圧縮 ──────────────────────────────────────────────
function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// index.html の compressBgDataUrl() と完全に同じロジック
function compressBgDataUrl(dataUrl) {
  const compress = (src, maxDim, quality) => new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else       { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => resolve(src);
    img.src = src;
  });
  return compress(dataUrl, 1280, 0.75).then(result => {
    if (result.length > 700000) return compress(result, 960, 0.65);
    return result;
  });
}

function getTransform(key) {
  try {
    const all = JSON.parse(localStorage.getItem(BG_TRANSFORM_KEY) || "{}");
    return { ...BG_TRANSFORM_DEF, ...(all[key] || {}) };
  } catch { return { ...BG_TRANSFORM_DEF }; }
}

// ─── メイン処理 ──────────────────────────────────────────────
let idbRecords    = [];
let firestoreKeys = [];
let overwriteMode = false;

async function init() {
  // 1. Firebase 認証
  try {
    await new Promise(resolve => {
      const unsub = fbAuth.onAuthStateChanged(u => { unsub(); resolve(u); });
    });
    if (!fbAuth.currentUser) await fbAuth.signInAnonymously();
    setBadge("rowFirebase", "ok", "OK");
  } catch (e) {
    setBadge("rowFirebase", "err", "失敗");
    document.getElementById("cardScan").style.display = "";
    document.getElementById("scanResult").innerHTML =
      `<div class="notice notice-red">Firebase 認証失敗: ${e.message}</div>`;
    return;
  }

  // 2. IndexedDB を開く（壊れていたら自動修復）
  let db;
  let repaired = false;
  try {
    const result = await openDb();
    db       = result.db;
    repaired = result.repaired;
    showDiagnostics(db, repaired);
    setBadge("rowIDB", repaired ? "warn" : "ok", repaired ? "修復済" : "OK");
  } catch (e) {
    setBadge("rowIDB", "err", "失敗");
    document.getElementById("diagInfo").innerHTML =
      `<span class="err">IndexedDB エラー: ${e.message}</span>`;
    document.getElementById("cardDiag").style.display = "";
    document.getElementById("cardScan").style.display = "";
    document.getElementById("scanResult").innerHTML =
      `<div class="notice notice-red">IndexedDB を開けませんでした: ${e.message}</div>`;
    return;
  }

  // 3. Firestore の backgrounds コレクションを確認
  let firestoreDocs = [];
  try {
    const snap = await fbDb.collection("backgrounds").get();
    firestoreDocs  = snap.docs.map(d => ({ id: d.id, hasData: !!d.data().data }));
    firestoreKeys  = firestoreDocs.map(d => d.id);
  } catch (e) {
    console.warn("[migrate] Firestore 確認失敗:", e);
  }

  // Firestore 現在状態を表示
  const fsBody = document.getElementById("firestoreStatusBody");
  if (firestoreDocs.length > 0) {
    fsBody.innerHTML = `
      <div style="margin-bottom:8px">
        <strong style="color:#4ade80">${firestoreDocs.length} 件</strong> の背景が既に Firestore に存在します。
      </div>
      <div style="font-size:12px; color:#aaa;">
        ${firestoreDocs.map(d => `• <code>${d.id}</code>`).join("<br>")}
      </div>
      <div class="notice notice-green" style="margin-top:10px; font-size:12px;">
        ℹ メインページで背景が表示されている場合、これらの Firestore データが使われています。
        IndexedDB への依存はなく、移行は完了している可能性が高いです。
      </div>`;
  } else {
    fsBody.innerHTML = `<div style="color:#fbbf24">Firestore の backgrounds コレクションにはまだデータがありません。</div>`;
  }
  document.getElementById("cardFirestoreStatus").style.display = "";

  // 4. IndexedDB の settings ストアから背景データを読み込む
  const allRecords = await getAllSettings(db);
  idbRecords = allRecords.filter(r => r.key && isBgKey(r.key) && r.blob);

  // 5. スキャン結果を表示
  const resultEl = document.getElementById("scanResult");

  if (idbRecords.length === 0) {
    // IndexedDB に背景データがない場合 → なぜ表示されているかを説明
    let explanation = "";
    if (firestoreDocs.length > 0) {
      explanation = `
        <div class="notice notice-green" style="margin-top:10px;">
          ✅ <strong>移行は既に完了しています。</strong><br>
          メインページで背景が表示されているのは Firestore から読み込まれているためです。
          IndexedDB への保存をやめて Firestore から共有する仕組みへの移行は完了しています。
        </div>`;
    } else {
      explanation = `
        <div class="notice notice-yellow" style="margin-top:10px;">
          ⚠ このブラウザ（オリジン: <code>${location.origin}</code>）の IndexedDB には背景データがありません。<br><br>
          背景データが別のオリジン（<code>localhost</code> や <code>file://</code> など）に保存されている場合、
          Netlify 上のこのツールからはアクセスできません。<br><br>
          その場合は：ローカル環境でこのツールを直接開いてください（index.html と同じ場所で実行するとアクセス可能です）。
        </div>`;
    }
    resultEl.innerHTML = `
      <div>IndexedDB（このオリジン）の背景データ: <strong style="color:#fbbf24">0 件</strong></div>
      ${explanation}`;
    document.getElementById("btnStart").disabled = true;
  } else {
    const conflicts = idbRecords.filter(r => firestoreKeys.includes(r.key));
    const newKeys   = idbRecords.filter(r => !firestoreKeys.includes(r.key));
    resultEl.innerHTML = `
      <div>IndexedDB に <strong>${idbRecords.length} 件</strong> の背景データが見つかりました。</div>
      <div style="margin-top:6px; font-size:12px; color:#aaa;">
        ${idbRecords.map(r => `• <code>${r.key}</code>`).join("<br>")}
      </div>
      <div style="margin-top:10px;">
        Firestore に既存: <strong style="color:${conflicts.length > 0 ? '#fbbf24' : '#4ade80'}">${conflicts.length} 件</strong>
        ／ 新規: <strong style="color:#4ade80">${newKeys.length} 件</strong>
      </div>`;
    document.getElementById("btnStart").disabled = false;
    document.getElementById("btnStart").onclick = () => onStartClicked(conflicts);
  }

  document.getElementById("cardScan").style.display = "";
}

function onStartClicked(conflicts) {
  if (conflicts.length > 0) {
    const ul = document.getElementById("conflictList");
    ul.innerHTML = conflicts.map(r => `<li>${r.key}</li>`).join("");
    document.getElementById("overlay").classList.add("show");

    document.getElementById("btnOverwrite").onclick = () => {
      overwriteMode = true;
      document.getElementById("overlay").classList.remove("show");
      startMigration();
    };
    document.getElementById("btnSkipExisting").onclick = () => {
      overwriteMode = false;
      document.getElementById("overlay").classList.remove("show");
      startMigration();
    };
  } else {
    overwriteMode = true;
    startMigration();
  }
}

async function startMigration() {
  document.getElementById("scanBtnRow").style.display = "none";
  document.getElementById("cardLog").style.display = "";
  log("info", `=== 移行開始 (${idbRecords.length} 件) ===`);
  log("info", overwriteMode ? "モード: 既存キーも上書き" : "モード: 既存キーはスキップ");
  log("info", "");

  let ok = 0, skipped = 0, failed = 0;

  for (const record of idbRecords) {
    const key = record.key;

    if (!overwriteMode && firestoreKeys.includes(key)) {
      log("skip", `SKIP  ${key}  （Firestore に既存のためスキップ）`);
      skipped++;
      continue;
    }

    try {
      const dataUrl     = await blobToDataUrl(record.blob);
      const originalKB  = Math.round(dataUrl.length / 1024);
      const compressed  = await compressBgDataUrl(dataUrl);
      const compKB      = Math.round(compressed.length / 1024);
      const transform   = getTransform(key);

      await fbDb.doc(`backgrounds/${key}`).set({ data: compressed, transform });

      log("ok", `OK    ${key}  ${originalKB}KB → ${compKB}KB`);
      ok++;
    } catch (e) {
      log("err", `FAIL  ${key}  ${e.message || e}`);
      failed++;
    }
  }

  log("info", "");
  log("info", `=== 完了: 成功 ${ok} / スキップ ${skipped} / 失敗 ${failed} ===`);

  const sumEl = document.getElementById("summaryEl");
  if (failed === 0) {
    sumEl.innerHTML = `<div class="notice notice-green" style="margin-top:10px; font-size:14px; font-weight:bold;">
      ✅ 移行完了：${ok} 件成功、${skipped} 件スキップ<br>
      <span style="font-size:13px; font-weight:normal; margin-top:4px; display:block;">
        メインページ（/）を開いて背景画像が表示されるか確認してください。</span>
    </div>`;
  } else {
    sumEl.innerHTML = `<div class="notice notice-red" style="margin-top:10px; font-size:14px; font-weight:bold;">
      ⚠ 移行完了（失敗あり）：成功 ${ok} / スキップ ${skipped} / 失敗 ${failed}<br>
      <span style="font-size:13px; font-weight:normal; margin-top:4px; display:block;">
        上のログで FAIL と表示されたキーを確認してください。</span>
    </div>`;
  }
}

init();
</script>
</body>
</html>
