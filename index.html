        // ══════════════════════════════════════════════════════════════
        // トレカ撮影（標準カメラで撮影 → 枠に合わせて位置調整して切り出し）
        // ══════════════════════════════════════════════════════════════
        // getUserMedia は file:// では権限エラーになるため、
        // <input type="file" capture="environment"> でOS標準のカメラを起動し、
        // 撮った写真をこのアプリ内の調整画面でドラッグ/ピンチして枠に合わせる方式にしている。
        //
        // 配置のズレを防ぐため、画像の初期表示位置は CSS(flex centering) に任せ、
        // JS側は画像を包む cropImgWrapper に対して transform: scale() のみを適用する。
        // ドラッグ操作も同じ wrapper の translate に乗せるだけなので、座標計算が不要になる。
        let cropTargetFace = "front"; // "front" or "back"
        let cropOrientation = "portrait"; // "portrait"(縦) or "landscape"(横)
        let cropScale = 1, cropMinScale = 0.3, cropMaxScale = 5;
        let cropTranslateX = 0, cropTranslateY = 0;
        let cropPointers = new Map();
        let cropPinchStartDist = 0, cropPinchStartScale = 1;
        let cropDragStart = null; // {x, y, translateX, translateY}

        function startCardCapture(targetFace) {
            cropTargetFace = targetFace;
            const input = document.getElementById("cropSourceInput");
            input.onchange = handleCropSourceSelected;
            input.value = "";
            input.click();
        }

        function handleCropSourceSelected(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (ev) => openCropModal(ev.target.result);
            reader.onerror = () => alert("画像の読み込みに失敗しました。");
            reader.readAsDataURL(file);
        }

        function openCropModal(dataUrl) {
            const modal = document.getElementById("cropModal");
            const imgEl = document.getElementById("cropSourceImg");

            // 撮影ごとに状態をリセット
            cropScale = 1;
            cropTranslateX = 0;
            cropTranslateY = 0;
            cropOrientation = "portrait";
            updateGuideFrameOrientation();

            imgEl.onload = () => {
                resetCropTransform();
                attachCropGestureHandlers();
            };
            imgEl.onerror = () => {
                alert("画像の表示に失敗しました。もう一度撮影し直してください。");
                closeCropModal();
            };

            modal.classList.remove("hidden");
            modal.classList.add("flex");
            imgEl.src = dataUrl;

            if (imgEl.complete && imgEl.naturalWidth > 0) {
                resetCropTransform();
                attachCropGestureHandlers();
            }
        }

        function closeCropModal() {
            document.getElementById("cropModal").classList.add("hidden");
            document.getElementById("cropModal").classList.remove("flex");
            detachCropGestureHandlers();
            cropPointers.clear();
        }

        // 縦/横の切り替え：ガイド枠のアスペクト比を反転させる
        function toggleCropOrientation() {
            cropOrientation = (cropOrientation === "portrait") ? "landscape" : "portrait";
            updateGuideFrameOrientation();
        }

        function updateGuideFrameOrientation() {
            const frame = document.getElementById("cropGuideFrame");
            if (cropOrientation === "landscape") {
                frame.style.aspectRatio = "3/2";
                frame.style.width = "80%";
                frame.style.maxHeight = "60%";
            } else {
                frame.style.aspectRatio = "2/3";
                frame.style.width = "70%";
                frame.style.maxHeight = "80%";
            }
        }

        // transformを初期状態（スケール1、移動なし）に戻す。
        // 画像はimg側のmax-width/max-heightで自動的にステージに収まるよう表示されるため、
        // JS側で位置計算をする必要がない。
        function resetCropTransform() {
            const imgEl = document.getElementById("cropSourceImg");
            const stage = document.getElementById("cropStage");
            const stageRect = stage.getBoundingClientRect();
            const stageH = stageRect.height || (window.innerHeight - 200);
            const stageW = stageRect.width || window.innerWidth;

            // 画像がステージ内に収まる初期表示サイズになるようCSSで制約する
            imgEl.style.maxWidth = stageW + "px";
            imgEl.style.maxHeight = stageH + "px";
            imgEl.style.width = "auto";
            imgEl.style.height = "auto";

            cropScale = 1;
            cropTranslateX = 0;
            cropTranslateY = 0;
            applyCropTransform();
        }

        function applyCropTransform() {
            const wrapper = document.getElementById("cropImgWrapper");
            wrapper.style.transform = `translate(${cropTranslateX}px, ${cropTranslateY}px) scale(${cropScale})`;
        }

        // ── ドラッグ／ピンチ操作（Pointer Events で統一的に処理） ──────────────
        function attachCropGestureHandlers() {
            const stage = document.getElementById("cropStage");
            stage.addEventListener("pointerdown", onCropPointerDown);
            stage.addEventListener("pointermove", onCropPointerMove);
            stage.addEventListener("pointerup", onCropPointerUp);
            stage.addEventListener("pointercancel", onCropPointerUp);
            // 長押しで「画像を保存」等のブラウザ標準メニューが出るのを防ぐ
            stage.addEventListener("contextmenu", preventCropContextMenu);
        }

        function preventCropContextMenu(e) {
            e.preventDefault();
        }

        function detachCropGestureHandlers() {
            const stage = document.getElementById("cropStage");
            stage.removeEventListener("pointerdown", onCropPointerDown);
            stage.removeEventListener("pointermove", onCropPointerMove);
            stage.removeEventListener("pointerup", onCropPointerUp);
            stage.removeEventListener("pointercancel", onCropPointerUp);
            stage.removeEventListener("contextmenu", preventCropContextMenu);
        }

        function onCropPointerDown(e) {
            e.preventDefault();
            cropPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

            if (cropPointers.size === 1) {
                cropDragStart = { x: e.clientX, y: e.clientY, translateX: cropTranslateX, translateY: cropTranslateY };
            } else if (cropPointers.size === 2) {
                const pts = Array.from(cropPointers.values());
                cropPinchStartDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                cropPinchStartScale = cropScale;
            }
        }

        function onCropPointerMove(e) {
            if (!cropPointers.has(e.pointerId)) return;
            cropPointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

            if (cropPointers.size === 1 && cropDragStart) {
                const dx = e.clientX - cropDragStart.x;
                const dy = e.clientY - cropDragStart.y;
                cropTranslateX = cropDragStart.translateX + dx;
                cropTranslateY = cropDragStart.translateY + dy;
                applyCropTransform();
            } else if (cropPointers.size === 2) {
                const pts = Array.from(cropPointers.values());
                const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                if (cropPinchStartDist > 0) {
                    cropScale = Math.min(cropMaxScale, Math.max(cropMinScale, cropPinchStartScale * (dist / cropPinchStartDist)));
                    applyCropTransform();
                }
            }
        }

        function onCropPointerUp(e) {
            cropPointers.delete(e.pointerId);
            if (cropPointers.size < 2) cropPinchStartDist = 0;
            if (cropPointers.size === 0) cropDragStart = null;
        }

        // 「この位置で確定」：画面上のガイド枠に対応する画像の実ピクセル範囲を切り出す。
        // wrapperにtransformを適用した「見た目上の画像の表示範囲」を基準に、
        // 枠の画面座標がimg要素のどの相対位置にあるかを逆算する。
        function confirmCrop() {
            const imgEl = document.getElementById("cropSourceImg");
            const frameEl = document.getElementById("cropGuideFrame");

            const imgRect = imgEl.getBoundingClientRect(); // transform適用後の画面上の表示範囲
            const frameRect = frameEl.getBoundingClientRect();

            if (imgRect.width === 0 || imgRect.height === 0) {
                alert("画像の準備中です。少し待ってから再度お試しください。");
                return;
            }

            // 画像の natural サイズに対する、表示上1pxあたりの実ピクセル比率
            const ratioX = imgEl.naturalWidth / imgRect.width;
            const ratioY = imgEl.naturalHeight / imgRect.height;

            const sx = (frameRect.left - imgRect.left) * ratioX;
            const sy = (frameRect.top - imgRect.top) * ratioY;
            const sw = frameRect.width * ratioX;
            const sh = frameRect.height * ratioY;

            const canvas = document.getElementById("cropCanvas");
            // 縦長/横長で出力解像度を切り替える
            const outW = (cropOrientation === "landscape") ? 1200 : 800;
            const outH = (cropOrientation === "landscape") ? 800 : 1200;
            canvas.width = outW;
            canvas.height = outH;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(imgEl, sx, sy, sw, sh, 0, 0, outW, outH);

            const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
            applyCroppedPhoto(dataUrl);
            closeCropModal();
        }

        // 切り出した画像を表面/裏面どちらかのプレビューに反映する
        function applyCroppedPhoto(dataUrl) {
            if (cropTargetFace === "back") {
                currentTempImageUrlBack = dataUrl;
                removeBackImageFlag = false;
                const imgPreview = document.getElementById("imgPreviewBack");
                imgPreview.src = dataUrl;
                imgPreview.classList.remove("hidden");
                document.getElementById("imgPlaceholderBack").classList.add("hidden");
                document.getElementById("removeBackBtn").classList.remove("hidden");
            } else {
                currentTempImageUrl = dataUrl;
                const imgPreview = document.getElementById("imgPreview");
                imgPreview.src = dataUrl;
                imgPreview.classList.remove("hidden");
                document.getElementById("imgPlaceholder").classList.add("hidden");
            }
        }


        async function saveCard() {
            const theme = document.getElementById("formTheme").value.trim() || "無題のトレカ";
            const member = document.getElementById("formMember").value;
            const album = document.getElementById("formAlbum").value;
            const category = document.getElementById("formCategory").value;
            const editId = document.getElementById("editIndex").value;
            const tags = parseTagsInput(document.getElementById("formTags").value);

            if (!editId && !currentTempImageUrl) {
                alert("トレカ画像を登録してください！");
                return;
            }

            try {
                if (editId) {
                    const card = pcData.find(d => d.id === editId);
                    if (card) {
                        card.theme = theme;
                        card.member = member;
                        card.album = album;
                        card.category = category;
                        card.tags = tags;
                        await saveCardToDB(card);
                        // 新しい画像が選択された場合のみBlobを更新
                        if (currentTempImageUrl) {
                            await saveImageBlob(card.id, currentTempImageUrl);
                        }
                        // 裏面: 新しい画像が選ばれていれば更新、削除フラグが立っていればBlobを削除
                        if (currentTempImageUrlBack) {
                            await saveImageBlob(card.id + "_back", currentTempImageUrlBack);
                        } else if (removeBackImageFlag) {
                            await deleteImageBlob(card.id + "_back");
                        }
                    }
                } else {
                    const newId = generateId();
                    const newCard = {
                        id: newId,
                        member: member,
                        album: album,
                        category: category,
                        theme: theme,
                        tags: tags,
                        sortOrder: 999,
                        createdAt: Date.now()
                    };
                    await saveCardToDB(newCard);
                    await saveImageBlob(newId, currentTempImageUrl);
                    if (currentTempImageUrlBack) {
                        await saveImageBlob(newId + "_back", currentTempImageUrlBack);
                    }
                }

                closeModal();
                await loadPCData();
                renderApp();
                updateStorageEstimate();
            } catch (err) {
                console.error("saveCard failed:", err);
                alert("保存に失敗しました。エラー: " + (err && err.message ? err.message : err));
            }
        }

        // "ウインク, ぬいぐるみ" のようなカンマ区切り入力を配列に変換する
        function parseTagsInput(value) {
            if (!value) return [];
            // 半角スペース・全角スペースの両方を区切り文字として扱う
            return value.split(/[\s\u3000]+/).map(t => t.trim()).filter(t => t.length > 0);
        }

        async function editCard(id) {
            const card = pcData.find(d => d.id === id);
            if (!card) return;

            updateThemeDatalist();
            document.getElementById("modalTitle").innerText = "トレカ情報の編集";
            document.getElementById("editIndex").value = card.id;
            document.getElementById("formTheme").value = card.theme;
            document.getElementById("formMember").value = card.member;
            document.getElementById("formAlbum").value = card.album;
            document.getElementById("formCategory").value = card.category;
            document.getElementById("formTags").value = (card.tags || []).join(" ");
            
            currentTempImageUrl = "";
            const imgPreview = document.getElementById("imgPreview");
            if (card.imgUrl) {
                imgPreview.src = card.imgUrl;
                imgPreview.classList.remove("hidden");
                document.getElementById("imgPlaceholder").classList.add("hidden");
            } else {
                imgPreview.classList.add("hidden");
                document.getElementById("imgPlaceholder").classList.remove("hidden");
            }

            // 裏面画像の表示
            currentTempImageUrlBack = "";
            removeBackImageFlag = false;
            document.getElementById("formImageBack").value = "";
            const imgPreviewBack = document.getElementById("imgPreviewBack");
            if (card.imgUrlBack) {
                imgPreviewBack.src = card.imgUrlBack;
                imgPreviewBack.classList.remove("hidden");
                document.getElementById("imgPlaceholderBack").classList.add("hidden");
                document.getElementById("removeBackBtn").classList.remove("hidden");
            } else {
                imgPreviewBack.src = "";
                imgPreviewBack.classList.add("hidden");
                document.getElementById("imgPlaceholderBack").classList.remove("hidden");
                document.getElementById("removeBackBtn").classList.add("hidden");
            }

            document.getElementById("cardModal").classList.remove("hidden");
        }

        async function deleteCard(id) {
            if (!confirm("このトレカを削除してもよろしいですか？")) return;
            const target = pcData.find(d => d.id === id);
            if (target) await captureUndoSnapshot([target]);
            await deleteCardFromDB(id);
            await loadPCData();
            renderApp();
            updateStorageEstimate();
            showUndoToast(1);
        }

        let currentPreviewCardId = null;
        let isShowingBackFace = false;

        function openPreviewModal(id) {
            const card = pcData.find(d => d.id === id);
            if (!card) return;

            currentPreviewCardId = id;
            isShowingBackFace = false;
            renderPreviewFace(card);

            document.getElementById("viewModalMember").innerText = card.member;
            document.getElementById("viewModalAlbum").innerText = card.album;
            document.getElementById("viewModalCategory").innerText = card.category;
            document.getElementById("viewModalTheme").innerText = card.theme;

            const tagsRow = document.getElementById("viewModalTagsRow");
            const tagsBox = document.getElementById("viewModalTags");
            if (card.tags && card.tags.length > 0) {
                tagsRow.classList.remove("hidden");
                tagsBox.innerHTML = card.tags.map(t =>
                    `<span class="bg-sky-950/60 text-sky-300 border border-sky-800/50 text-[10px] font-bold px-2 py-0.5 rounded-full">#${t}</span>`
                ).join('');
            } else {
                tagsRow.classList.add("hidden");
                tagsBox.innerHTML = "";
            }

            document.getElementById("previewModal").classList.remove("hidden");
        }

        // プレビューモーダル内の画像領域をタップすると表/裏を切り替える
        function renderPreviewFace(card) {
            const imgEl = document.getElementById("viewModalImg");
            const noImgIcon = document.getElementById("viewModalNoImgIcon");
            const flipHint = document.getElementById("viewModalFlipHint");

            const targetUrl = isShowingBackFace ? card.imgUrlBack : card.imgUrl;

            if (targetUrl) {
                imgEl.src = targetUrl;
                imgEl.classList.remove("hidden");
                noImgIcon.classList.add("hidden");
            } else {
                imgEl.classList.add("hidden");
                noImgIcon.classList.remove("hidden");
            }

            // 裏面画像が存在する場合だけ「タップして裏面」ヒントを出す
            if (card.imgUrlBack) {
                flipHint.classList.remove("hidden");
                flipHint.innerText = isShowingBackFace ? "🔄 タップして表面" : "🔄 タップして裏面";
            } else {
                flipHint.classList.add("hidden");
            }
        }

        function toggleViewModalFace() {
            const card = pcData.find(d => d.id === currentPreviewCardId);
            if (!card || !card.imgUrlBack) return; // 裏面が無いカードは切り替え不要
            isShowingBackFace = !isShowingBackFace;
            renderPreviewFace(card);
        }

        function closePreviewModal() {
            document.getElementById("previewModal").classList.add("hidden");
            currentPreviewCardId = null;
            isShowingBackFace = false;
        }

        function openAlbumModal() {
            currentTempAlbumCoverUrl = "";
            document.getElementById("newAlbumCoverStatus").innerText = "未選択";
            renderAlbumListModal();
            document.getElementById("albumModal").classList.remove("hidden");
        }

        function closeAlbumModal() {
            document.getElementById("albumModal").classList.add("hidden");
            updateFormSelectOptions();
            renderApp();
        }

        function renderAlbumListModal() {
            const container = document.getElementById("albumList");
            container.innerHTML = albums.map((a, i) => `
                <div class="flex flex-col gap-2 bg-gray-900 border border-gray-800 rounded-lg p-3">
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-gray-500 font-bold">名:</span>
                        <input type="text" value="${a.name}" onchange="renameAlbum(${i}, this.value)" class="flex-1 font-bold text-white text-xs bg-transparent border-b border-gray-700 focus:border-pink-500 focus:outline-none px-1">
                        ${albums.length > 1 ? `<button onclick="deleteAlbum(${i})" class="text-rose-400 hover:text-rose-300 text-xs font-bold px-1">✕</button>` : ''}
                    </div>
                    <div class="flex items-center justify-between gap-2 pt-1">
                        <label class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-[10px] rounded-md px-2 py-1 font-bold cursor-pointer transition-colors">
                            📸 フォルダから画像を選ぶ
                            <input type="file" accept="image/*" class="file-input-hidden" onchange="updateAlbumCoverFile(${i}, this)">
                        </label>
                        <span class="text-[10px] ${a.coverUrl ? 'text-emerald-400' : 'text-gray-500'} font-bold">
                            ${a.coverUrl ? '✓ 設定済み' : '画像なし'}
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // 【修正3】forEach + async (await待ちなし) を for...of に変更し、
        // 全カードの更新が完了してから saveAlbums()/renderAlbumListModal() に進むようにする
        async function renameAlbum(index, newName) {
            const oldName = albums[index].name;
            const trimNewName = newName.trim();
            if (trimNewName === "" || trimNewName === oldName) { renderAlbumListModal(); return; }
            if (albums.some((a, idx) => a.name === trimNewName && idx !== index)) { alert("同名のアルバムが存在します"); renderAlbumListModal(); return; }

            albums[index].name = trimNewName;

            const affectedCards = pcData.filter(card => card.album === oldName);
            affectedCards.forEach(card => { card.album = trimNewName; });
            await saveCardsToDB(affectedCards);

            saveAlbums();
            renderAlbumListModal();
        }

        function updateAlbumCoverFile(index, input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                albums[index].coverUrl = e.target.result;
                saveAlbums();
                renderAlbumListModal();
                updateStorageEstimate();
            };
            reader.readAsDataURL(file);
        }

        function previewAlbumCoverNew(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                currentTempAlbumCoverUrl = e.target.result;
                document.getElementById("newAlbumCoverStatus").innerText = "✓ 選択中";
                document.getElementById("newAlbumCoverStatus").className = "text-[10px] text-emerald-400 font-bold";
            };
            reader.readAsDataURL(file);
        }

        function addAlbum() {
            const name = document.getElementById("newAlbumName").value.trim();
            if (name === "") return;
            if (albums.some(a => a.name === name)) { alert("同名のアルバムが存在します"); return; }
            
            albums.push({ name, coverUrl: currentTempAlbumCoverUrl || "" });
            saveAlbums();
            
            document.getElementById("newAlbumName").value = "";
            currentTempAlbumCoverUrl = "";
            document.getElementById("newAlbumCoverStatus").innerText = "未選択";
            document.getElementById("newAlbumCoverStatus").className = "text-[10px] text-gray-500";
            
            renderAlbumListModal();
            updateStorageEstimate();
        }

        // 【修正3】forEach + async (await待ちなし) を for...of に変更
        async function deleteAlbum(index) {
            const name = albums[index].name;
            const cardCount = pcData.filter(d => d.album === name).length;
            if (cardCount > 0 && !confirm(`アルバム「${name}」には ${cardCount} 枚のトレカが入っています。削除すると「N/a」に移動します。よろしいですか？`)) return;
            
            if (cardCount > 0) {
                const affectedCards = pcData.filter(card => card.album === name);
                affectedCards.forEach(card => { card.album = "N/a"; });
                await saveCardsToDB(affectedCards);
            }
            albums.splice(index, 1);
            saveAlbums();
            renderAlbumListModal();
            updateStorageEstimate();
        }

        function saveAlbums() { localStorage.setItem(STORAGE_KEY_ALBUMS, JSON.stringify(albums)); }
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

        // ══════════════════════════════════════════════════════════════
        // 複数選択モード・一括操作
        // ══════════════════════════════════════════════════════════════
        function toggleMultiSelectMode() {
            isMultiSelectMode = !isMultiSelectMode;
            selectedCardIds.clear();

            const toggleBtn = document.getElementById("multiSelectToggleBtn");
            const bar = document.getElementById("multiSelectBar");
            const addBtn = document.getElementById("addBtn");
            const albumBtn = document.getElementById("manageAlbumsBtn");

            bar.classList.toggle("hidden", !isMultiSelectMode);
            toggleBtn.classList.toggle("bg-purple-700", isMultiSelectMode);
            toggleBtn.classList.toggle("border-purple-500", isMultiSelectMode);
            // 選択モード中は新規追加・アルバム管理ボタンを隠して誤操作を防ぐ
            if (currentRole !== "viewer") {
                addBtn.classList.toggle("hidden", isMultiSelectMode);
                if (currentRole === "admin") albumBtn.classList.toggle("hidden", isMultiSelectMode);
            }

            updateSelectedCountLabel();
            renderApp();
        }

        function toggleCardSelection(id) {
            if (selectedCardIds.has(id)) selectedCardIds.delete(id);
            else selectedCardIds.add(id);
            updateSelectedCountLabel();
            renderGallery();
        }

        function updateSelectedCountLabel() {
            document.getElementById("selectedCount").innerText = `${selectedCardIds.size}枚を選択中`;
        }

        function selectAllCards() {
            const memberCards = pcData.filter(d => d.member === currentMember);
            memberCards.forEach(card => selectedCardIds.add(card.id));
            updateSelectedCountLabel();
            renderGallery();
        }

        async function bulkDeleteCards() {
            if (selectedCardIds.size === 0) { alert("カードが選択されていません。"); return; }
            if (!confirm(`選択した ${selectedCardIds.size} 枚のトレカを削除します。よろしいですか？`)) return;

            const targets = pcData.filter(d => selectedCardIds.has(d.id));
            await captureUndoSnapshot(targets);

            for (const card of targets) {
                await deleteCardFromDB(card.id);
            }

            selectedCardIds.clear();
            toggleMultiSelectMode();
            await loadPCData();
            renderApp();
            updateStorageEstimate();
            showUndoToast(targets.length);
        }

        function openBulkMoveModal() {
            if (selectedCardIds.size === 0) { alert("カードが選択されていません。"); return; }
            document.getElementById("bulkMoveMember").innerHTML = memberData.map(m => `<option value="${m.name}">${m.icon} ${m.name}</option>`).join('');
            document.getElementById("bulkMoveAlbum").innerHTML = albums.map(a => `<option value="${a.name}">💿 ${a.name}</option>`).join('');
            document.getElementById("bulkMoveMember").value = currentMember;
            document.getElementById("bulkMoveModal").classList.remove("hidden");
        }

        function closeBulkMoveModal() {
            document.getElementById("bulkMoveModal").classList.add("hidden");
        }

        async function confirmBulkMove() {
            const targetMember = document.getElementById("bulkMoveMember").value;
            const targetAlbum = document.getElementById("bulkMoveAlbum").value;
            const targetCategory = document.getElementById("bulkMoveCategory").value;

            const targets = pcData.filter(d => selectedCardIds.has(d.id));
            targets.forEach(card => {
                card.member = targetMember;
                card.album = targetAlbum;
                card.category = targetCategory;
            });
            await saveCardsToDB(targets);

            closeBulkMoveModal();
            selectedCardIds.clear();
            toggleMultiSelectMode();
            currentMember = targetMember;
            updateTabUI();
            await loadPCData();
            renderApp();
            updateStorageEstimate();
        }

        // ══════════════════════════════════════════════════════════════
        // 削除のUndo（元に戻す）
        // ══════════════════════════════════════════════════════════════
        // 削除予定のカードの画像Blobをbase64にコピーしておく(Blobは削除すると失われるため)
        async function captureUndoSnapshot(cardsToDelete) {
            const imagesMap = new Map();
            for (const card of cardsToDelete) {
                const blob = await getImageBlob(card.id);
                if (blob) imagesMap.set(card.id, await blobToDataUrl(blob));
            }
            lastDeletedSnapshot = {
                cards: cardsToDelete.map(c => ({ ...stripImgUrl(c) })),
                images: imagesMap
            };
        }

        function showUndoToast(count) {
            const bar = document.getElementById("undoBar");
            document.getElementById("undoMessage").innerText = `${count}枚を削除しました`;
            bar.classList.remove("hidden");
            bar.classList.add("flex");
            if (undoTimer) clearTimeout(undoTimer);
            undoTimer = setTimeout(() => {
                bar.classList.add("hidden");
                bar.classList.remove("flex");
                lastDeletedSnapshot = null;
            }, 6000);
        }

        async function undoLastDelete() {
            if (!lastDeletedSnapshot) return;
            const { cards, images } = lastDeletedSnapshot;

            await saveCardsToDB(cards);
            for (const card of cards) {
                const dataUrl = images.get(card.id);
                if (dataUrl) await saveImageBlob(card.id, dataUrl);
            }

            lastDeletedSnapshot = null;
            if (undoTimer) clearTimeout(undoTimer);
            const bar = document.getElementById("undoBar");
            bar.classList.add("hidden");
            bar.classList.remove("flex");

            await loadPCData();
            renderApp();
            updateStorageEstimate();
        }

        function toggleExportMenu() {
            document.getElementById("exportMenu").classList.toggle("hidden");
        }
        // メニュー外をタップしたら閉じる
        document.addEventListener("click", function(e) {
            const menu = document.getElementById("exportMenu");
            const btn = e.target.closest("button");
            if (menu && !menu.classList.contains("hidden")) {
                const clickedToggle = btn && btn.getAttribute("onclick") === "toggleExportMenu()";
                if (!menu.contains(e.target) && !clickedToggle) menu.classList.add("hidden");
            }
        });

        // Blob → base64文字列 へ変換するヘルパー（フル出力用）
        function blobToDataUrl(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        async function exportData(includeImages) {
            document.getElementById("exportMenu").classList.add("hidden");

            let exportAlbums = albums;
            let exportCards;

            if (!includeImages) {
                // 画像(base64)を除いたメタデータのみのコピーを作成
                exportCards = pcData.map(({ imgUrl, imgUrlBack, ...rest }) => ({ ...rest, imgUrl: "", imgUrlBack: "" }));
            } else {
                // imgUrl/imgUrlBackは表示用のObjectURLなので、images ストアのBlobからbase64を再生成する
                exportCards = await Promise.all(pcData.map(async (card) => {
                    const [blob, backBlob] = await Promise.all([
                        getImageBlob(card.id),
                        getImageBlob(card.id + "_back")
                    ]);
                    const dataUrl = blob ? await blobToDataUrl(blob) : "";
                    const backDataUrl = backBlob ? await blobToDataUrl(backBlob) : "";
                    const { imgUrl, imgUrlBack, ...rest } = card;
                    return { ...rest, imgUrl: dataUrl, imgUrlBack: backDataUrl };
                }));
            }

            const backupData = {
                meta: { exportedAt: new Date().toISOString(), includesImages: !!includeImages },
                albums: exportAlbums,
                cards: exportCards
            };
            const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            const suffix = includeImages ? "full" : "metadata";
            a.href = URL.createObjectURL(blob);
            a.download = `izna_photocard_backup_${suffix}_${Date.now()}.json`;
            a.click();
        }

        // 【修正3】store.clear()のトランザクション完了を明示的に待ち、
        // その後にカード群を1トランザクションでまとめてput（saveCardsToDB）するよう変更
        function clearCardStore() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).clear();
                tx.oncomplete = () => resolve();
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        function importData(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.albums && data.cards) {
                        const isMetadataOnly = data.meta && data.meta.includesImages === false;
                        const warningMsg = isMetadataOnly
                            ? "⚠️ このファイルはメタデータのみのバックアップで、画像が含まれていません。\nインポートすると画像が空欄の状態で登録されます。\n続行しますか？"
                            : "データを上書きインポートします。よろしいですか？";
                        if (confirm(warningMsg)) {
                            albums = data.albums;
                            saveAlbums();

                            await clearCardStore();
                            await clearImageStore();
                            await saveCardsToDB(data.cards);
                            // フル出力（base64入り）の場合は画像をBlobとして個別に保存
                            for (const card of data.cards) {
                                if (card.imgUrl && card.imgUrl.startsWith("data:")) {
                                    await saveImageBlob(card.id, card.imgUrl);
                                }
                                if (card.imgUrlBack && card.imgUrlBack.startsWith("data:")) {
                                    await saveImageBlob(card.id + "_back", card.imgUrlBack);
                                }
                            }

                            await loadPCData();
                            updateFormSelectOptions();
                            renderApp();
                            updateStorageEstimate();
                            alert("インポートが完了しました！");
                        }
                    } else {
                        alert("不正なファイルフォーマットです。");
                    }
                } catch(err) {
                    alert("ファイルの読み込みに失敗しました。");
                }
            };
            reader.readAsText(file);
        }

        async function updateStorageEstimate() {
            const section = document.getElementById("storageSection");

            // 閲覧者には残量情報を見せない
            if (currentRole === "viewer") {
                section.classList.add("hidden");
                return;
            }
            section.classList.remove("hidden");

            try {
                if (navigator.storage && navigator.storage.estimate) {
                    const { usage, quota } = await navigator.storage.estimate();
                    const pct = quota ? Math.min(100, (usage / quota) * 100) : 0;
                    const bar = document.getElementById("storageBar");
                    bar.style.width = pct.toFixed(1) + "%";
                    bar.className = "h-full rounded-full transition-all " +
                        (pct > 80 ? "bg-rose-500" : pct > 50 ? "bg-yellow-500" : "bg-gradient-to-r from-purple-500 to-pink-500");
                    const usageMB = (usage / 1024 / 1024).toFixed(1);
                    const quotaMB = (quota / 1024 / 1024).toFixed(0);
                    document.getElementById("storageLabel").innerText = `${usageMB} MB / ${quotaMB} MB (${pct.toFixed(0)}%)`;
                } else {
                    document.getElementById("storageLabel").innerText = "この端末では取得できません";
                }
            } catch (e) {
                document.getElementById("storageLabel").innerText = "取得に失敗しました";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
